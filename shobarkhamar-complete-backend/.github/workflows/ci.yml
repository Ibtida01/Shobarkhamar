name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: shobarkhamar-backend

jobs:
  # ─── 1. Lint + Test ──────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shobarkhamar_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: shobarkhamar-complete-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: shobarkhamar-complete-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env for tests
        run: |
          cat > .env <<EOF
          APP_NAME=Shobarkhamar
          ENVIRONMENT=test
          DEBUG=False
          API_VERSION=v1
          HOST=0.0.0.0
          PORT=8000
          DATABASE_URL=postgresql+asyncpg://postgres:password@localhost:5432/shobarkhamar_test
          DATABASE_POOL_SIZE=5
          DATABASE_MAX_OVERFLOW=0
          REDIS_URL=redis://localhost:6379/0
          REDIS_PASSWORD=
          REDIS_DB=0
          JWT_SECRET_KEY=ci-secret-key-1234567890abcdefgh
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          REFRESH_TOKEN_EXPIRE_DAYS=7
          API_BASE_URL=http://localhost:8000/api/v1
          API_TIMEOUT=30
          MAX_UPLOAD_SIZE=10485760
          ALLOWED_IMAGE_EXTENSIONS=.jpg,.jpeg,.png,.gif
          UPLOAD_DIR=./uploads
          CORS_ORIGINS=http://localhost:3000
          CORS_ALLOW_CREDENTIALS=True
          LOG_LEVEL=INFO
          LOG_FILE=logs/app.log
          MODEL_PATH=./models/best_B4_wiener_False.pth
          POULTRY_MODEL_PATH=./models/efficientnetv2_b4_best.pth
          MODEL_VERSION=1.0.0
          EOF

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ─── 2. Build & Push Docker image ────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./shobarkhamar-complete-backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─── 3. Deploy to Railway ────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd shobarkhamar-complete-backend
          railway up --service backend --detach
