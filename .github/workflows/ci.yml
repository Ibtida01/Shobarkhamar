name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. Test Backend ──────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shobarkhamar_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: shobarkhamar-complete-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: shobarkhamar-complete-backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx aiosqlite email-validator

      - name: Create .env for tests
        run: |
          cat > .env <<EOF
          APP_NAME=Shobarkhamar
          ENVIRONMENT=test
          DEBUG=False
          API_VERSION=v1
          HOST=0.0.0.0
          PORT=8000
          DATABASE_URL=postgresql+asyncpg://postgres:password@localhost:5432/shobarkhamar_test
          DATABASE_POOL_SIZE=5
          DATABASE_MAX_OVERFLOW=10
          REDIS_URL=redis://localhost:6379/0
          REDIS_PASSWORD=
          REDIS_DB=0
          JWT_SECRET_KEY=ci-secret-key-1234567890abcdefgh
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          REFRESH_TOKEN_EXPIRE_DAYS=7
          API_BASE_URL=http://localhost:8000/api/v1
          API_TIMEOUT=30
          MAX_UPLOAD_SIZE=10485760
          ALLOWED_IMAGE_EXTENSIONS=.jpg,.jpeg,.png,.gif
          UPLOAD_DIR=./uploads
          CORS_ORIGINS=http://localhost:3000
          CORS_ALLOW_CREDENTIALS=True
          LOG_LEVEL=INFO
          LOG_FILE=logs/app.log
          MODEL_PATH=./models/best_B4_wiener_False.pth
          POULTRY_MODEL_PATH=./models/efficientnetv2_b4_best.pth
          MODEL_VERSION=1.0.0
          EOF

      - name: Run tests
        run: pytest tests/test_smoke.py -v --tb=short

  # ─── 2. Test Frontend ─────────────────────────────────────────
  test-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: shobarkhamar-complete-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: shobarkhamar-complete-frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://shobarkhamar-production.up.railway.app

  # ─── 3. Deploy Backend to Railway ────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service backend --detach

  # ─── 4. Deploy Frontend to Vercel ────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd shobarkhamar-complete-frontend
          vercel --prod --token $VERCEL_TOKEN