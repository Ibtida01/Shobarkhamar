services:
  db:
    image: postgres:15-alpine
    container_name: shobarkhamar-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shobarkhamar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shobarkhamar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shobarkhamar-api
    env_file:
      - ./shobarkhamar-complete-backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/shobarkhamar
      REDIS_URL: redis://redis:6379/0
      MODEL_PATH: /app/models/best_B4_wiener_False.pth
      POULTRY_MODEL_PATH: /app/models/best_model.pt
    ports:
      - "18000:8000"
    volumes:
      - ./shobarkhamar-complete-backend/app:/app/app
      - ./shobarkhamar-complete-backend/uploads:/app/uploads
      - ./shobarkhamar-complete-backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./shobarkhamar-complete-frontend
      dockerfile: Dockerfile
    container_name: shobarkhamar-frontend
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./shobarkhamar-complete-frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
